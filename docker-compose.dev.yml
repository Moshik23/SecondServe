version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: foodhawk-db-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: foodhawk
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - foodhawk-network

  # FastAPI Backend (development mode with hot reload)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: foodhawk-backend-dev
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/foodhawk
      SECRET_KEY: dev-secret-key
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - foodhawk-network

  # React Frontend (development mode)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: foodhawk-frontend-dev
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm start
    networks:
      - foodhawk-network

volumes:
  postgres_data:
    driver: local

networks:
  foodhawk-network:
    driver: bridge
