services:
  # Backend API Service
  - type: web
    name: foodhawk-backend
    env: docker
    region: oregon
    plan: free
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: foodhawk-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"

  # Frontend Web Service
  - type: web
    name: foodhawk-frontend
    env: docker
    region: oregon
    plan: free
    dockerContext: ./frontend
    dockerfilePath: ./frontend/Dockerfile
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: foodhawk-backend
          property: host

databases:
  # PostgreSQL Database
  - name: foodhawk-db
    databaseName: foodhawk
    user: foodhawk
    region: oregon
    plan: free
