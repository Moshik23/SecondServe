---
# Ansible playbook for deploying FoodHawk Platform
# This playbook sets up the infrastructure and deploys the application

- name: Deploy FoodHawk Platform
  hosts: all
  become: yes
  vars:
    project_name: foodhawk
    deploy_user: deploy
    app_dir: /opt/{{ project_name }}
    docker_compose_version: "2.21.0"

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install system dependencies
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - python3-pip
          - python3-docker
          - git
        state: present

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_lsb.codename }} stable"
        state: present

    - name: Install Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present

    - name: Start and enable Docker service
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Create deploy user
      user:
        name: "{{ deploy_user }}"
        groups: docker
        append: yes
        shell: /bin/bash
        state: present

    - name: Create application directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: '0755'

    - name: Copy docker-compose file
      copy:
        src: ../docker-compose.yml
        dest: "{{ app_dir }}/docker-compose.yml"
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: '0644'

    - name: Copy environment file
      copy:
        src: ../backend/.env.example
        dest: "{{ app_dir }}/.env"
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: '0600'

    - name: Pull Docker images
      docker_compose:
        project_src: "{{ app_dir }}"
        pull: yes
      become_user: "{{ deploy_user }}"

    - name: Start services with Docker Compose
      docker_compose:
        project_src: "{{ app_dir }}"
        state: present
        restarted: yes
      become_user: "{{ deploy_user }}"

    - name: Wait for backend to be healthy
      uri:
        url: "http://localhost:8000/health"
        status_code: 200
      register: result
      until: result.status == 200
      retries: 30
      delay: 5

    - name: Display deployment info
      debug:
        msg:
          - "Deployment completed successfully!"
          - "Backend API: http://localhost:8000"
          - "Frontend: http://localhost"
          - "API Documentation: http://localhost:8000/docs"
