---
# Ansible playbook for initial server setup
# This playbook configures a fresh server with basic security and tools

- name: Initial Server Setup
  hosts: all
  become: yes
  vars:
    ssh_port: 22
    firewall_allowed_ports:
      - 22    # SSH
      - 80    # HTTP
      - 443   # HTTPS
      - 8000  # Backend API (dev only)

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Upgrade all packages
      apt:
        upgrade: dist
        autoremove: yes
        autoclean: yes

    - name: Install basic packages
      apt:
        name:
          - vim
          - htop
          - tmux
          - git
          - curl
          - wget
          - unzip
          - ufw
          - fail2ban
        state: present

    - name: Configure UFW firewall
      ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop: "{{ firewall_allowed_ports }}"

    - name: Enable UFW
      ufw:
        state: enabled
        policy: deny

    - name: Configure fail2ban
      copy:
        dest: /etc/fail2ban/jail.local
        content: |
          [DEFAULT]
          bantime = 3600
          findtime = 600
          maxretry = 5
          
          [sshd]
          enabled = true
          port = {{ ssh_port }}
          filter = sshd
          logpath = /var/log/auth.log
          maxretry = 3
        mode: '0644'
      notify: restart fail2ban

    - name: Start fail2ban
      systemd:
        name: fail2ban
        state: started
        enabled: yes

    - name: Configure automatic security updates
      apt:
        name: unattended-upgrades
        state: present

    - name: Enable automatic security updates
      copy:
        dest: /etc/apt/apt.conf.d/50unattended-upgrades
        content: |
          Unattended-Upgrade::Allowed-Origins {
              "${distro_id}:${distro_codename}";
              "${distro_id}:${distro_codename}-security";
          };
          Unattended-Upgrade::AutoFixInterruptedDpkg "true";
          Unattended-Upgrade::MinimalSteps "true";
          Unattended-Upgrade::Remove-Unused-Kernel-Packages "true";
          Unattended-Upgrade::Remove-Unused-Dependencies "true";
          Unattended-Upgrade::Automatic-Reboot "false";
        mode: '0644'

    - name: Set timezone to UTC
      timezone:
        name: UTC

    - name: Configure NTP
      apt:
        name: chrony
        state: present

    - name: Start and enable chrony
      systemd:
        name: chrony
        state: started
        enabled: yes

    - name: Create swap file (if not exists)
      command:
        cmd: fallocate -l 2G /swapfile
        creates: /swapfile
      register: swap_create

    - name: Set swap permissions
      file:
        path: /swapfile
        mode: '0600'
      when: swap_create.changed

    - name: Make swap
      command:
        cmd: mkswap /swapfile
      when: swap_create.changed

    - name: Enable swap
      command:
        cmd: swapon /swapfile
      when: swap_create.changed

    - name: Add swap to fstab
      lineinfile:
        path: /etc/fstab
        line: '/swapfile none swap sw 0 0'
        create: yes
      when: swap_create.changed

  handlers:
    - name: restart fail2ban
      systemd:
        name: fail2ban
        state: restarted
