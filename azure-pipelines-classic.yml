# Alternative Azure DevOps Pipeline (Classic UI-friendly)
# Simpler pipeline without Terraform - uses Azure CLI directly

trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  dockerHubUsername: 'your-dockerhub-username'
  azureRegion: 'eastus'
  projectName: 'foodhawk'
  environment: 'production'

steps:
# Build and Push Backend Docker Image
- task: Docker@2
  displayName: 'Login to Docker Hub'
  inputs:
    command: login
    containerRegistry: 'dockerHubConnection'

- task: Docker@2
  displayName: 'Build Backend Image'
  inputs:
    repository: '$(dockerHubUsername)/foodhawk-backend'
    command: build
    Dockerfile: 'backend/Dockerfile'
    tags: |
      latest
      $(Build.BuildId)

- task: Docker@2
  displayName: 'Push Backend Image'
  inputs:
    repository: '$(dockerHubUsername)/foodhawk-backend'
    command: push
    tags: |
      latest
      $(Build.BuildId)

# Deploy Backend to Azure App Service
- task: AzureWebApp@1
  displayName: 'Deploy Backend to Azure App Service'
  inputs:
    azureSubscription: '$(azureSubscription)'
    appType: 'webAppLinux'
    appName: '$(projectName)-backend'
    package: '$(System.DefaultWorkingDirectory)'

# Deploy Frontend to Azure Static Web Apps
- task: AzureStaticWebApp@0
  displayName: 'Deploy Frontend to Static Web Apps'
  inputs:
    app_location: 'frontend'
    api_location: 'backend'
    output_location: 'build'
    azure_static_web_apps_api_token: '$(staticWebAppsToken)'
